<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil — ASRAR PRO</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .user-bar { display:flex; align-items:center; justify-content:space-between;
                background:var(--glass-bg); border:1px solid var(--glass-border);
                border-radius:12px; padding:12px 18px; margin-bottom:20px; }
    .user-info { display:flex; align-items:center; gap:12px; }
    .avatar { width:42px; height:42px; border-radius:50%; overflow:hidden;
              background:var(--accent); display:flex; align-items:center;
              justify-content:center; font-size:1.2rem; font-weight:bold; }
    .signout-btn { background:rgba(255,100,100,.3); border:1px solid rgba(255,100,100,.4);
                   padding:8px 16px; border-radius:20px; cursor:pointer; color:#fff;
                   font-size:.85rem; width:auto; margin:0; }
    .signout-btn:hover { background:rgba(255,100,100,.5); transform:none; }

    /* Menus groupés (grand menu + sous-menu) */
    .menu-group { margin-bottom:26px; }
    .group-title { font-size:1.15rem; font-weight:700; letter-spacing:1px; margin-bottom:14px;
                   padding-bottom:8px; border-bottom:1px solid var(--glass-border);
                   background:-webkit-linear-gradient(45deg,var(--accent),var(--accent-hover));
                   -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .sub-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:14px; }
    .sub-grid .menu-item h3 { font-size:.9rem; margin-top:8px; }
    .menu-item { position:relative; }
    .fav-star { position:absolute; top:5px; right:7px; background:none; border:none;
                color:#C9A961; font-size:1.15rem; line-height:1; padding:2px; cursor:pointer; opacity:.8; }
    .fav-star:hover { opacity:1; }
    .menu-item.is-fav { outline:1px solid rgba(201,169,97,.55); outline-offset:-1px; }
  </style>
  <script src="/js/theme.js"></script>
  <script src="/js/nav.js"></script>
</head>
<body>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="../js/whatsapp.js"></script>
  <script src="../js/firebase-config.js"></script>

  <div class="container">
    <!-- User bar -->
    <div class="user-bar">
      <div class="user-info">
        <div class="avatar" id="avatar">?</div>
        <div>
          <div style="font-weight:600;" id="user-name">Chargement...</div>
          <div style="font-size:.8rem; color:var(--text-muted);" id="user-email"></div>
        </div>
      </div>
      <button class="signout-btn" onclick="signOut()">Déconnexion</button>
    </div>

    <div class="header">
      <img src="/assets/logo-mark.png" alt="ASRAR PRO"
           style="width:84px;height:84px;display:block;margin:0 auto 8px;border-radius:16px;">
      <h1>ASRAR PRO</h1>
      <p style="color:var(--text-muted);">Tableau de bord</p>
    </div>

    <div class="grid-menu" style="display:block;">
      <!-- ASRAR PRO -->
      <section class="menu-group">
        <h2 class="group-title">ASRAR PRO</h2>
        <div class="sub-grid">
          <a href="../asrar/asrar.html" class="menu-item"><div style="font-size:2rem;">📜</div><h3>Secret Mystique</h3></a>
          <a href="../abajad/abajad.html" class="menu-item"><div style="font-size:2rem;">🔢</div><h3>Numérologie</h3></a>
          <a href="../planete/planete.html" class="menu-item"><div style="font-size:2rem;">🌍</div><h3>Planète</h3></a>
          <a href="../Benefits/index.html" class="menu-item"><div style="font-size:2rem;">🕌</div><h3>Noms d'Allah</h3></a>
          <a href="../rouwhania/index.html" class="menu-item"><div style="font-size:2rem;">🌀</div><h3>Rouwhanes</h3></a>
          <a href="../bibliotheque/bibliotheque.html" class="menu-item"><div style="font-size:2rem;">📚</div><h3>Bibliothèque</h3></a>
          <a href="../marche/marche.html" class="menu-item"><div style="font-size:2rem;">🛒</div><h3>Marché Des Produits Mystiques</h3></a>
        </div>
      </section>

      <!-- AL QALAM -->
      <section class="menu-group">
        <h2 class="group-title">Al Qalam</h2>
        <div class="sub-grid">
          <a href="../alqalam/index.html?mode=simple" class="menu-item"><div style="font-size:2rem;">🖋️</div><h3>Al Qalam</h3></a>
        </div>
      </section>

      <!-- GÉOMANCIE -->
      <section class="menu-group">
        <h2 class="group-title">Géomancie</h2>
        <div class="sub-grid">
          <a href="../geomancie/tourab.html" class="menu-item"><div style="font-size:2rem;">🪨</div><h3>Tourab</h3></a>
        </div>
      </section>
    </div>
  </div>

  <script>
    // Compat : nettoie d'anciens paramètres ?token=... d'URL (plus de paiement en ligne).
    (function () {
      const params = new URLSearchParams(location.search);
      if (params.has("token") || params.has("canceled")) {
        history.replaceState({}, document.title, location.pathname);
        if (typeof invalidateAccessCache === "function") invalidateAccessCache();
      }
    })();

    // Page accessible dès la connexion ; le portail s'affichera au clic sur un module verrouillé.
    requireAuth((user) => {
      const name = user.displayName || user.email.split('@')[0];
      document.getElementById('user-name').innerText  = name;
      document.getElementById('user-email').innerText = user.email;
      const avatar = document.getElementById('avatar');
      if (user.photoURL) {
        avatar.innerHTML = `<img src="${user.photoURL}" alt="" referrerpolicy="no-referrer" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      } else {
        avatar.innerText = name.charAt(0).toUpperCase();
      }
    });

    // ── Favoris de menus : épingler ses modules en tête (persistant) ──
    (function initMenuFavorites() {
      const FAV_KEY = 'asrar_menu_favs';
      let favs = [];
      try { favs = JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch (e) { favs = []; }
      const save = () => { try { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); } catch (e) {} };

      document.querySelectorAll('.sub-grid').forEach((grid) => {
        const items = Array.from(grid.querySelectorAll('.menu-item'));
        if (items.length < 2) return; // rien à réorganiser

        function reorder() {
          Array.from(grid.querySelectorAll('.menu-item'))
            .sort((a, b) => {
              const ia = favs.indexOf(a.getAttribute('href'));
              const ib = favs.indexOf(b.getAttribute('href'));
              return (ia < 0 ? Infinity : ia) - (ib < 0 ? Infinity : ib);
            })
            .forEach((it) => grid.appendChild(it));
        }

        items.forEach((a) => {
          const key = a.getAttribute('href');
          if (favs.includes(key)) a.classList.add('is-fav');
          const star = document.createElement('button');
          star.className = 'fav-star';
          star.type = 'button';
          star.setAttribute('aria-label', 'Épingler ce module');
          star.textContent = favs.includes(key) ? '★' : '☆';
          star.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            const i = favs.indexOf(key);
            if (i >= 0) favs.splice(i, 1); else favs.unshift(key);
            save();
            const on = favs.includes(key);
            star.textContent = on ? '★' : '☆';
            a.classList.toggle('is-fav', on);
            reorder();
          });
          a.appendChild(star);
        });
        reorder();
      });
    })();
  </script>
    <script src="/pwa.js" defer></script>
</body>
</html>
