  <script>
    // Compat : nettoie d'anciens paramètres ?token=... d'URL (plus de paiement en ligne).
    (function () {
      const params = new URLSearchParams(location.search);
      if (params.has("token") || params.has("canceled")) {
        history.replaceState({}, document.title, location.pathname);
        if (typeof invalidateAccessCache === "function") invalidateAccessCache();
      }
    })();

    // Page accessible dès la connexion ; le portail s'affichera au clic sur un module verrouillé.
    requireAuth((user) => {
      const name = user.displayName || user.email.split('@')[0];
      document.getElementById('user-name').innerText  = name;
      document.getElementById('user-email').innerText = user.email;
      const avatar = document.getElementById('avatar');
      if (user.photoURL) {
        avatar.innerHTML = `<img src="${user.photoURL}" alt="" referrerpolicy="no-referrer" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      } else {
        avatar.innerText = name.charAt(0).toUpperCase();
      }
    });
  </script>
