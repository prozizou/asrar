<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Marché Mystique — ASRAR PRO</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="stylesheet" href="../css/style.css">
    <script src="/js/loader.js" defer></script>
  <link rel="stylesheet" href="marche.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Carlito:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
  <script src="/js/theme.js"></script>
  <script src="/js/nav.js"></script>
</head>
<body>
    <div id="asrar-loader"><div class="asrar-spinner"></div><span class="asrar-loader-text">Chargement…</span></div>
  <!-- Firebase & API -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="../js/whatsapp.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/api-content.js"></script>

  <div class="container">
    <a href="../accueil/accueil.html" class="back-btn">← Retour</a>
    <div class="glass-panel" id="mainMarketView">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
        <h2 style="margin:0;">🛒 Marché Mystique</h2>
        <a href="../boutique/boutique.html" class="shop-link"
           style="background:#C9A961;color:#000;text-decoration:none;font-weight:700;padding:8px 14px;border-radius:10px;font-size:.85rem;">🏪 Ma boutique</a>
      </div>
      <p class="subtitle">Produits ésotériques de nos praticiens certifiés</p>

      <div class="market-nav">
        <input type="text" class="search-bar" id="searchInput" placeholder="🔍 Rechercher un produit..." oninput="filterProducts()">
      </div>

      <!-- Section vendeurs -->
      <div class="vendors-section" id="vendorsSection">
        <h3>🌙 Nos praticiens et vendeurs certifiés</h3>
        <div class="vendors-scroll" id="vendorsScroll"></div>
      </div>

      <!-- Filtres -->
      <div class="filters" id="filtersBar"></div>

      <!-- Grille produits -->
      <div class="prod-grid" id="prodGrid">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      </div>
    </div>

    <!-- Vue boutique vendeur (masquée au départ) -->
    <div class="glass-panel" id="vendorShopView" style="display:none;">
      <button class="back-btn" onclick="showMainMarket()" style="border:none; background:none; cursor:pointer;">← Retour au marché</button>
      <div id="vendorShopContent"></div>
    </div>
  </div>

  <!-- Modale produit -->
  <div class="modal-overlay" id="prodModal">
    <div class="modal-box">
      <span class="modal-close" onclick="closeModal()">✕</span>
      <img id="m-img" class="modal-img" src="" alt="" onerror="this.style.display='none'">
      <div id="m-thumbs" class="m-thumbs" style="display:none;"></div>
      <h3 id="m-name"></h3>
      <div id="m-price" style="font-size:1.3rem; font-weight:700; color:#6bffb8; margin:8px 0;"></div>
      <div class="vendor-block" id="m-vendor-block"></div>
      <div id="m-desc" style="line-height:1.7; border-top:1px solid #1F1F23; padding-top:14px;"></div>
      <div class="social-bar" id="m-social">
        <button class="like-btn" id="m-like-btn" onclick="toggleProductLike()">
          <span id="m-like-icon">🤍</span> <span id="m-like-count">0</span>
        </button>
        <button class="comment-toggle-btn" onclick="toggleCommentsPanel()">
          💬 <span id="m-comment-count">0</span>
        </button>
      </div>

      <div class="comments-panel" id="m-comments-panel">
        <div class="comment-list" id="m-comment-list"></div>
        <div class="comment-input-row">
          <textarea id="m-comment-input" maxlength="500" rows="1"
                    placeholder="Écrire un commentaire…"
                    oninput="autoGrowComment(this)"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();postProductComment();}"></textarea>
          <button class="comment-send" onclick="postProductComment()" aria-label="Envoyer">➤</button>
        </div>
      </div>

      <button class="add-to-cart-btn" id="addToCartBtn" onclick="commanderProduit()">🛍️ Commander via WhatsApp</button>
    </div>
  </div>

  <script src="marche.js"></script>
    <script src="/pwa.js" defer></script>
</body>
</html>
