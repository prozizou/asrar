<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bibliothèque Almaqtab — ASRAR PRO</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="stylesheet" href="../css/style.css">
    <script src="/js/loader.js" defer></script>
  <!-- Polices mystiques -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Carlito:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* === BASE ÉSOTÉRIQUE === */
    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      font-family: 'Carlito', 'Noto Naskh Arabic', sans-serif;
      margin: 0;
      transition: background 0.3s;
    }
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1rem;
    }
    .glass-panel {
      background: transparent !important;
      backdrop-filter: none !important;
      border: none !important;
      padding: 1rem 0;
    }
    .back-btn {
      color: var(--text-main);
      text-decoration: none;
      font-size: 0.9rem;
      display: inline-block;
      margin-bottom: 1.5rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 1; }
    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.5px;
    }
    .subtitle {
      color: var(--text-dim);
      margin-top: 4px;
      margin-bottom: 1.5rem;
    }

    /* === BARRE DE RECHERCHE & FILTRES === */
    .search-section {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    .search-bar {
      flex: 2 1 250px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
    }
    .search-bar::placeholder { color: var(--text-faint); }
    .filter-select {
      flex: 1 1 150px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 12px;
      color: var(--text-main);
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }
    .filter-select option {
      background: var(--surface);
      color: var(--text-main);
    }
    #bookCount {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin: 0.5rem 0 1rem;
    }

    /* === GRILLE ÉTAGÈRE === */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 10px;
    }
    .book-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .book-card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.16);
      border-color: var(--border-strong);
    }
    .book-cover {
      height: 220px;
      background: var(--surface-3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      color: var(--text-main);
      overflow: hidden;
      position: relative;
    }
    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .book-info {
      padding: 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .book-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
      line-height: 1.3;
    }
    .book-meta {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .book-pt {
      color: var(--accent);
      font-size: 0.85rem;
      margin-top: auto;
    }
    .bookmark-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 1.2rem;
      opacity: 0.7;
    }

    /* Squelettes */
    .skeleton {
      background: var(--surface);
      border-radius: 16px;
      height: 300px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }
    .empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-faint);
      font-style: italic;
    }

    /* === MODALE DE DÉTAIL === */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 30px;
      max-width: 600px;
      width: 92%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      color: var(--text-main);
      font-family: 'Carlito', sans-serif;
      transition: background 0.3s, color 0.3s;
    }
    .modal-box.sepia-mode {
      background: #2b2a1e;
      color: #f0e6d3;
      border-color: #5e5726;
    }
    .modal-close {
      position: absolute;
      top: 18px;
      right: 18px;
      cursor: pointer;
      font-size: 1.4rem;
      color: var(--text-dim);
    }
    .modal-img {
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      border-radius: 14px;
      margin-bottom: 20px;
      background: var(--surface-3);
    }
    #modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      margin: 0.5rem 0;
    }
    .modal-meta-line {
      color: var(--accent);
      margin: 8px 0;
      font-size: 0.9rem;
    }
    .modal-description {
      margin: 16px 0;
      line-height: 1.6;
      font-size: 1rem;
    }
    .comfort-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 18px 0;
      flex-wrap: wrap;
    }
    .comfort-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      padding: 6px 14px;
      color: var(--text-main);
      cursor: pointer;
      font-size: 0.85rem;
    }
    .comfort-btn.active {
      background: var(--accent);
      color: var(--text-on-accent);
      border-color: var(--accent);
    }
    #modal-pt {
      color: var(--accent);
      margin: 10px 0;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0 10px;
    }
    .action-btn {
      background: var(--accent);
      border: none;
      color: var(--text-on-accent);
      padding: 12px 22px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-size: 0.95rem;
    }
    .action-btn.secondary {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    .action-btn:hover {
      filter: brightness(1.1);
    }
    .modal-bookmark {
      font-size: 1.4rem;
      cursor: pointer;
      margin-left: auto;
    }
    .modal-bookmark.saved { color: var(--accent); }

    /* Responsive */
    @media (max-width: 600px) {
      .search-section {
        flex-direction: column;
      }
      .book-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
      }
      .book-cover { height: 180px; }
    }
  </style>
  <script src="/js/theme.js"></script>
  <script src="/js/nav.js"></script>
</head>
<body>
    <div id="asrar-loader"><div class="asrar-spinner"></div><span class="asrar-loader-text">Chargement…</span></div>
  <!-- Firebase & API -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="../js/whatsapp.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/api-content.js"></script>
  <script src="../js/share.js"></script>

  <div class="container">
    <a href="../accueil/accueil.html" class="back-btn">← Retour</a>

    <div class="glass-panel">
      <h2>📚 Bibliothèque Almaqtab</h2>
      <p class="subtitle">Manuscrits, traités et ouvrages mystiques.</p>

      <div id="bookCount"></div>
    </div>

    <!-- Grille de livres -->
    <div class="book-grid" id="bookGrid">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>

  <!-- Modale commentaires -->
  <div class="modal-overlay" id="commentModal">
    <div class="modal-box" id="commentBox">
      <span class="modal-close" onclick="closeComments()">✕</span>
      <h3 id="cmTitle">Commentaires</h3>
      <div id="cmList" class="cm-list"></div>
      <div class="cm-form">
        <textarea id="cmInput" maxlength="500" rows="2" placeholder="Écrire un commentaire…"></textarea>
        <button class="cm-send" onclick="submitComment()">Envoyer</button>
      </div>
    </div>
  </div>

  <style>
    .book-social { display:flex; gap:10px; margin-top:8px; }
    .bs-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(201,169,97,0.25);
      color:#cdbb8f; border-radius:20px; padding:5px 12px; font-size:.85rem; cursor:pointer; }
    .bs-btn.liked { color:#e0607a; border-color:#e0607a; background:rgba(224,96,122,0.1); }
    .book-cover, .book-title { cursor:pointer; }
    .cm-list { max-height:45vh; overflow:auto; margin:10px 0; text-align:left; }
    .cm-item { padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.08); }
    .cm-head { font-size:.85rem; color:#cdbb8f; }
    .cm-date { color:#7d7358; font-size:.75rem; margin-left:6px; }
    .cm-text { color:#e8e2d2; margin-top:3px; white-space:pre-wrap; word-break:break-word; }
    .cm-empty { color:#8a7f66; text-align:center; padding:16px; }
    .cm-form { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
    .cm-form textarea { width:100%; box-sizing:border-box; min-height:64px; border-radius:10px; padding:10px; background:rgba(0,0,0,0.3);
      border:1px solid rgba(79,172,254,0.3); color:#fff; resize:vertical; font-size:.95rem; }
    .book-highlight { outline:2px solid var(--accent); outline-offset:3px; border-radius:12px; }
    .cm-send { align-self:flex-end; background:linear-gradient(45deg,var(--accent),var(--accent-hover)); border:none; color:var(--text-on-accent);
      font-weight:700; border-radius:10px; padding:10px 22px; cursor:pointer; }
  </style>
  <script>
    // ==================== DONNÉES & ÉTAT ====================
    let allBooks = [];
    let socialStats = {};       // { key: {likes, liked, comments} }
    let currentCommentBook = null;

    // ==================== FALLBACKS ====================
    if (typeof ensureAccess !== 'function') window.ensureAccess = function (cb) { cb(); };
    if (typeof showSubscriptionGate !== 'function') window.showSubscriptionGate = function () {
      alert("\ud83d\udcdc Ce contenu est r\u00e9serv\u00e9 aux abonn\u00e9s. Demandez l'acc\u00e8s \u00e0 l'administration via WhatsApp.");
    };

    // ==================== INITIALISATION ====================
    requireAuth(() => { loadBooks(); });

    // Lien partagé : /s?k=book&i=<clé> → ?item=<clé> ici (ouverture après chargement).
    function ouvrirDepuisLien() {
      const deep = (typeof ASRAR_SHARE !== 'undefined') ? ASRAR_SHARE.deepLink() : null;
      if (!deep || !deep.key) return;
      ASRAR_SHARE.clean();
      const book = allBooks.find(b => b._key === deep.key);
      const card = document.getElementById('book-' + deep.key);
      if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); card.classList.add('book-highlight'); }
      if (book) ouvrirLivre(deep.key);
      else alert("Cet ouvrage n'est plus disponible.");
    }

    async function loadBooks() {
      try {
        const { items } = await apiPost('list-content', { kind: 'book' });
        allBooks = (items || []).map(b => ({
          ...b,
          // Compat multi-sch\u00e9mas ; plus de "Anonyme" ni "Non class\u00e9".
          text: b.text || b.title || b.titre || 'Sans titre',
          img: b.img || b.image || '',
          author: b.author || b.auteur || '',
          description: b.description || b.faida || b.content || ''
        }));
        renderBooks(allBooks);
        loadSocialCounts();
        ouvrirDepuisLien();
      } catch (e) {
        document.getElementById('bookGrid').innerHTML =
          '<p class="empty-msg">Erreur de chargement.<br><small>' + escapeHtml(e.message) + '</small></p>';
      }
    }

    async function loadSocialCounts() {
      try {
        const keys = allBooks.map(b => b._key);
        const { stats } = await apiPost('book-social', { action: 'counts', keys });
        socialStats = stats || {};
        allBooks.forEach(b => updateCardSocial(b._key));
      } catch (e) { /* silencieux */ }
    }

    // ==================== RENDU ====================
    function renderBooks(books) {
      const grid = document.getElementById('bookGrid');
      document.getElementById('bookCount').innerText = books.length + ' livre(s)';
      if (!books.length) { grid.innerHTML = '<p class="empty-msg">Aucun ouvrage disponible.</p>'; return; }
      grid.innerHTML = books.map(book => {
        const s = socialStats[book._key] || { likes: 0, liked: false, comments: 0 };
        return `
        <div class="book-card" id="book-${book._key}">
          <div class="book-cover" onclick="ouvrirLivre('${book._key}')">
            ${book.img ? `<img src="${escapeHtml(book.img)}" alt="${escapeHtml(book.text)}" loading="lazy" onerror="this.parentElement.innerHTML='\ud83d\udcd6'">` : '\ud83d\udcd6'}
          </div>
          <div class="book-info">
            <div class="book-title" onclick="ouvrirLivre('${book._key}')">${escapeHtml(book.text)}</div>
            ${book.author ? `<div class="book-meta">\u270d\ufe0f ${escapeHtml(book.author)}</div>` : ''}
            <div class="book-social">
              <button class="bs-btn ${s.liked ? 'liked' : ''}" id="like-${book._key}" onclick="toggleLike('${book._key}')">
                \u2764 <span id="likec-${book._key}">${s.likes}</span>
              </button>
              <button class="bs-btn" onclick="openComments('${book._key}')">
                \ud83d\udcac <span id="commc-${book._key}">${s.comments}</span>
              </button>
              <button class="bs-btn" title="Partager" onclick="partagerLivre('${book._key}')">\ud83d\udce4</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function updateCardSocial(key) {
      const s = socialStats[key]; if (!s) return;
      const lc = document.getElementById('likec-' + key); if (lc) lc.innerText = s.likes;
      const cc = document.getElementById('commc-' + key); if (cc) cc.innerText = s.comments;
      const lb = document.getElementById('like-' + key); if (lb) lb.classList.toggle('liked', s.liked);
    }

    // ==================== OUVERTURE DIRECTE DU DOCUMENT (pas de dialogue) ====================
    function ouvrirLivre(key) {
      ensureAccess(async () => {
        try {
          const { item } = await apiPost('get-content', { kind: 'book', key });
          const link = item.pdf || item.pdfUrl || '';
          if (!link) { alert("Lien du document indisponible."); return; }
          // Ouverture directe ; si le navigateur bloque la fenêtre (arrivée via
          // un lien partagé, donc sans geste utilisateur), on navigue sur place.
          const w = window.open(link, '_blank', 'noopener');
          if (!w) window.location.href = link;
        } catch (e) {
          if (e.status === 403) showSubscriptionGate();
          else alert('Erreur : ' + e.message);
        }
      });
    }

    // ==================== PARTAGE (lien profond) ====================
    function partagerLivre(key) {
      if (typeof ASRAR_SHARE === 'undefined') return;
      const b = allBooks.find(x => x._key === key) || {};
      const titre = b.text || 'Ouvrage';
      ASRAR_SHARE.share({
        kind: 'book', key: key, title: titre,
        text: '\ud83d\udcda ' + titre + ' — Bibliothèque Almaqtab sur ASRAR PRO'
      });
    }

    // ==================== LIKES ====================
    async function toggleLike(key) {
      try {
        const r = await apiPost('book-social', { action: 'like', bookKey: key });
        socialStats[key] = Object.assign({}, socialStats[key], { likes: r.likes, liked: r.liked });
        updateCardSocial(key);
      } catch (e) { alert('Erreur : ' + e.message); }
    }

    // ==================== COMMENTAIRES ====================
    async function openComments(key) {
      currentCommentBook = key;
      const book = allBooks.find(b => b._key === key);
      document.getElementById('cmTitle').innerText = 'Commentaires \u2014 ' + (book ? book.text : '');
      document.getElementById('cmList').innerHTML = '<p class="cm-empty">Chargement\u2026</p>';
      document.getElementById('cmInput').value = '';
      document.getElementById('commentModal').classList.add('open');
      document.body.style.overflow = 'hidden';
      try {
        const r = await apiPost('book-social', { action: 'list', bookKey: key });
        socialStats[key] = Object.assign({}, socialStats[key], { likes: r.likes, liked: r.liked, comments: r.comments.length });
        updateCardSocial(key);
        renderComments(r.comments);
      } catch (e) {
        document.getElementById('cmList').innerHTML = '<p class="cm-empty">Erreur : ' + escapeHtml(e.message) + '</p>';
      }
    }
    function renderComments(list) {
      const el = document.getElementById('cmList');
      if (!list.length) { el.innerHTML = '<p class="cm-empty">Aucun commentaire. Soyez le premier !</p>'; return; }
      el.innerHTML = list.map(c => `
        <div class="cm-item">
          <div class="cm-head"><b>${escapeHtml(c.name)}</b> <span class="cm-date">${fmtDate(c.at)}</span></div>
          <div class="cm-text">${escapeHtml(c.text)}</div>
        </div>`).join('');
    }
    async function submitComment() {
      const key = currentCommentBook; if (!key) return;
      const input = document.getElementById('cmInput');
      const text = input.value.trim(); if (!text) return;
      try {
        await apiPost('book-social', { action: 'comment', bookKey: key, text });
        input.value = '';
        const r = await apiPost('book-social', { action: 'list', bookKey: key });
        socialStats[key] = Object.assign({}, socialStats[key], { comments: r.comments.length });
        updateCardSocial(key);
        renderComments(r.comments);
      } catch (e) { alert('Erreur : ' + e.message); }
    }
    function closeComments() {
      document.getElementById('commentModal').classList.remove('open');
      document.body.style.overflow = '';
      currentCommentBook = null;
    }
    document.getElementById('commentModal').addEventListener('click', function (e) { if (e.target === this) closeComments(); });

    // ==================== UTILITAIRES ====================
    function fmtDate(t) { return t ? new Date(t).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' }) : ''; }
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
  </script>
    <script src="/pwa.js" defer></script>
</body>
</html>
