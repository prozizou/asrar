<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abajad — ASRAR PRO</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="stylesheet" href="../css/style.css">
    <script src="/js/loader.js" defer></script>
  <style>
    /* Les tokens (accent, texte, verre) proviennent de css/style.css
       — identité bleu glassmorphism partagée par tout le projet. */
    /* ---- Layout spécifique ---- */
    .abajad-input {
      font-size: 1.4rem;
      text-align: right;
      direction: rtl;
      letter-spacing: 2px;
      background: rgba(0,0,0,.3);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 14px 16px;
      border-radius: 12px;
      width: 100%;
      box-sizing: border-box;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 24px;
    }
    .result-card {
      background: rgba(0,0,0,.25);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 18px;
    }
    .result-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: var(--text-muted);
    }
    .result-big {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }
    .result-reduced {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .breakdown {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 15px;
      word-break: break-all;
      line-height: 1.9;
      direction: rtl;
      text-align: right;
    }
    .breakdown .mw-line {
      direction: ltr;
      text-align: left;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--glass-border);
      color: var(--text-main);
      font-size: 0.92rem;
    }
    .breakdown .mw-line strong {
      color: var(--accent);
    }
    .factor-pairs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .factor-pair {
      background: rgba(200,160,80,0.15);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.85rem;
      color: var(--accent);
      white-space: nowrap;
    }
    .factor-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
    }
    .factor-row {
      background: rgba(200,160,80,0.10);
      border: 1px solid var(--glass-border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 1.05rem;
      letter-spacing: 1px;
      color: var(--text-main);
    }
    .factor-row strong { color: var(--accent); }
    /* Bloc d'informations ésotériques */
    .eso-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 15px;
    }
    .eso-row {
      display: grid;
      grid-template-columns: 1.25fr 1fr 1fr;
      gap: 10px;
      align-items: baseline;
      background: rgba(200,160,80,0.08);
      border: 1px solid var(--glass-border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 9px 14px;
    }
    .eso-row .eso-k { color: var(--text-muted); font-size: 0.9rem; }
    .eso-row .eso-v { color: var(--text-main); font-weight: 600; text-align: center; }
    .eso-row.eso-head {
      background: transparent;
      border: none;
      border-left: 3px solid transparent;
      padding-bottom: 2px;
    }
    .eso-row.eso-head .eso-v { color: var(--accent); font-size: 0.85rem; }
    .sys-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .sys-btn {
      flex: 1;
      padding: 8px;
      border-radius: 12px;
      background: rgba(0,0,0,.3);
      border: 1px solid var(--glass-border);
      cursor: pointer;
      text-align: center;
      font-size: 0.85rem;
      transition: all .3s;
      color: var(--text-muted);
    }
    .sys-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #1a1a1a;
    }
    .letters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(60px,1fr));
      gap: 8px;
      direction: rtl;
    }
    .letter-cell {
      background: rgba(0,0,0,.3);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
    }
    .letter-char { font-size: 1.3rem; font-weight:600; }
    .letter-val  { font-size: 0.75rem; color: var(--accent); }

    .compare-section {
      margin-top: 30px;
      border-top: 1px solid var(--glass-border);
      padding-top: 20px;
    }
    .compare-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .compare-row input {
      flex: 1;
      text-align: right;
      direction: rtl;
      font-size: 1rem;
      padding: 8px 12px;
      background: rgba(0,0,0,.3);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-main);
    }
    .history-list {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 10px;
      font-size: 0.9rem;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .history-item span {
      color: var(--text-muted);
    }
    .history-item strong {
      color: var(--accent);
    }
    .clear-history {
      background: none;
      border: none;
      color: #d9534f;
      cursor: pointer;
      font-size: 0.8rem;
    }
    details {
      margin-top: 15px;
      background: rgba(255,255,255,0.03);
      padding: 10px 15px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
    }
    details summary {
      cursor: pointer;
      color: var(--accent);
      font-weight: bold;
    }

    /* ── Responsive : sur mobile, les deux colonnes de résultats passent
       en pile verticale et les grands nombres restent contenus. ── */
    @media (max-width: 560px) {
      .result-grid { grid-template-columns: 1fr; gap: 14px; }
      .result-big  { font-size: 1.8rem; }
      .abajad-input { font-size: 1.2rem; }
      .compare-row { flex-direction: column; gap: 8px; }
    }
  </style>
  <script src="/js/theme.js"></script>
  <script src="/js/viewmode.js"></script>
  <script src="/js/nav.js"></script>
</head>
<body>
    <div id="asrar-loader"><div class="asrar-spinner"></div><span class="asrar-loader-text">Chargement…</span></div>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="../js/whatsapp.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/api-content.js"></script>
  <script src="../js/main.js"></script>

  <div class="container">
    <a href="../accueil/accueil.html" class="back-btn">← Retour</a>

    <div class="glass-panel">
      <h2>🔢 Calculateur Abjad Ésotérique</h2>
      <p style="margin-bottom:18px;color:var(--text-muted);">
        Saisie en temps réel · Faces & Adad · Zodiaque · Facteurs mystiques<br>
        <span style="font-size:.85rem;">💡 Astuce : vous pouvez aussi saisir directement un nombre (ex. 711).</span>
      </p>

      <input type="text" class="abajad-input" id="abajadInput" dir="rtl"
             placeholder="بسم الله الرحمن الرحيم" list="versetList"
             autocomplete="off" oninput="gatedAbajad()" autofocus>
      <datalist id="versetList"></datalist>

      <!-- Résultats principaux -->
      <div class="result-grid">
        <div class="result-card">
          <h3>☀️ Mashreqi (Oriental)</h3>
          <div class="result-big" id="machreqiResult">0</div>
          <div class="result-reduced" id="machreqiReduced"></div>
        </div>
        <div class="result-card">
          <h3>🌙 Maghrébi (Occidental)</h3>
          <div class="result-big" id="maghrebiResult">0</div>
          <div class="result-reduced" id="maghrebiReduced"></div>
        </div>
      </div>

      <!-- Analyse ésotérique (faces, adad, zodiaque) — basée sur le total Mashreqi -->
      <div class="eso-info" id="esoInfo"></div>

      <!-- Décomposition (paires a×b du total Mashreqi) -->
      <div style="margin-top:15px;">
        <h4 style="margin:0 0 8px;color:var(--accent);">🔮 Décomposition (a × b)</h4>
        <div id="mysticFactors" class="factor-list"></div>
      </div>
    </div>



  </div>

  <script>
    // --- Authentification (doit être déjà gérée par main.js) ---
    requireAuth(() => {});

    // --- Tables de correspondance ---
    const TABLES = {
      mashriqi: [
        ['ا',1],['ب',2],['ج',3],['د',4],['ه',5],['و',6],['ز',7],['ح',8],['ط',9],['ي',10],
        ['ك',20],['ل',30],['م',40],['ن',50],['س',60],['ع',70],['ف',80],['ص',90],
        ['ق',100],['ر',200],['ش',300],['ت',400],['ث',500],['خ',600],['ذ',700],['ض',800],['ظ',900],['غ',1000]
      ],
      maghrebi: [
        ['ا',1],['ب',2],['ج',3],['د',4],['ه',5],['و',6],['ز',7],['ح',8],['ط',9],['ي',10],
        ['ك',20],['ل',30],['م',40],['ن',50],['ص',60],['ع',70],['ف',80],['ض',90],
        ['ق',100],['ر',200],['س',300],['ت',400],['ث',500],['خ',600],['ذ',700],['ظ',800],['غ',900],['ش',1000]
      ]
    };

    // Normalisation des caractères arabes (suppression diacritiques, variantes)
    function normalizeArabic(str) {
      return str
        .replace(/[أإآ]/g, 'ا')
        .replace(/[ؤئ]/g, 'و')
        .replace(/ة/g, 'ه')
        .replace(/[ىئ]/g, 'ي')
        .replace(/[ً-ْ]/g, '')      // diacritiques
        .replace(/[^ء-ي\s]/g, '')   // tout ce qui n'est pas arabe ou espace
        .replace(/\s+/g, '')        // supprimer les espaces
        .trim();
    }

    // Obtenir la valeur d'une lettre dans un système
    function getLetterValue(char, system) {
      const table = TABLES[system];
      const entry = table.find(([c]) => c === char);
      return entry ? entry[1] : 0;
    }

    // Réduction théosophique (addition itérative jusqu'à 1 chiffre)
    function reduceNumber(n) {
      if (n <= 0) return 0;
      while (n > 9) {
        n = n.toString().split('').reduce((a, b) => a + parseInt(b), 0);
      }
      return n;
    }

    // Trouver toutes les paires de facteurs d'un nombre
    function getFactorPairs(num) {
      if (num <= 1) return [];
      const pairs = [];
      for (let a = num - 1; a >= 2; a--) {
        if (num % a === 0) pairs.push([a, num / a]); // a répété (num/a) fois
      }
      return pairs; // ex. 66 → 33×2, 22×3, 11×6, 6×11, 3×22, 2×33
    }

    // --- Calcul principal ---
    function calculateAbajad() {
      const input = document.getElementById('abajadInput').value;
      let mashSum = 0, maghSum = 0;

      // Saisie DIRECTE d'un nombre : on l'utilise tel quel (les deux bases = ce
      // nombre), sans passer par le poids des lettres. Ex. taper « 711 ».
      // Les chiffres arabes (٠-٩ / ۰-۹) sont convertis en chiffres occidentaux.
      const ascii = input
        .replace(/[٠-٩]/g, d => d.charCodeAt(0) - 0x0660)
        .replace(/[۰-۹]/g, d => d.charCodeAt(0) - 0x06F0);
      const numeric = ascii.trim().replace(/[\s.,]/g, '');
      if (/^\d+$/.test(numeric)) {
        mashSum = maghSum = parseInt(numeric, 10);
      } else {
        const normalized = normalizeArabic(input);
        if (!normalized) { resetDisplay(); return; }
        normalized.split('').forEach(ch => {
          mashSum += getLetterValue(ch, 'mashriqi');
          maghSum += getLetterValue(ch, 'maghrebi');
        });
      }

      // Mise à jour des totaux
      document.getElementById('machreqiResult').textContent = mashSum;
      document.getElementById('maghrebiResult').textContent = maghSum;

      // Réduction théosophique
      document.getElementById('machreqiReduced').textContent = 
        mashSum > 0 ? `Réduit : ${reduceNumber(mashSum)}` : '';
      document.getElementById('maghrebiReduced').textContent = 
        maghSum > 0 ? `Réduit : ${reduceNumber(maghSum)}` : '';

      // Analyse ésotérique côte à côte (Mashreqi / Maghrébi)
      renderEsoInfo(mashSum, maghSum);

      // Facteurs mystiques (basé sur la somme Mashreqi)
      const factorPairs = getFactorPairs(mashSum);
      const factorsDiv = document.getElementById('mysticFactors');
      if (factorPairs.length > 0 && mashSum > 0) {
        factorsDiv.innerHTML = factorPairs.map(([a, b]) =>
          `<div class="factor-row"><strong>${a}</strong> × <strong>${b}</strong></div>`
        ).join('');
      } else {
        factorsDiv.innerHTML = '<span style="color:var(--text-muted);">Nombre premier — pas de décomposition.</span>';
      }
    }

    function resetDisplay() {
      document.getElementById('machreqiResult').textContent = '0';
      document.getElementById('maghrebiResult').textContent = '0';
      document.getElementById('machreqiReduced').textContent = '';
      document.getElementById('maghrebiReduced').textContent = '';
      document.getElementById('esoInfo').innerHTML = '';
      document.getElementById('mysticFactors').innerHTML = '';
    }

    // --- Analyse ésotérique (faces, adad, zodiaque) ---
    // Zodiaque indexé de 1 à 12 (ordre = valeur mod 12 ; 0 → 12 = Poissons).
    const ZODIAC = [
      null,
      { nom: 'Bélier',     nature: 'Feu',   intervalle: '21 mars au 19 avril' },
      { nom: 'Taureau',    nature: 'Terre', intervalle: '20 avril au 20 mai' },
      { nom: 'Gémeaux',    nature: 'Air',   intervalle: '21 mai au 20 juin' },
      { nom: 'Cancer',     nature: 'Eau',   intervalle: '21 juin au 22 juillet' },
      { nom: 'Lion',       nature: 'Feu',   intervalle: '23 juillet au 22 août' },
      { nom: 'Vierge',     nature: 'Terre', intervalle: '23 août au 22 septembre' },
      { nom: 'Balance',    nature: 'Air',   intervalle: '23 septembre au 22 octobre' },
      { nom: 'Scorpion',   nature: 'Eau',   intervalle: '23 octobre au 21 novembre' },
      { nom: 'Sagittaire', nature: 'Feu',   intervalle: '22 novembre au 21 décembre' },
      { nom: 'Capricorne', nature: 'Terre', intervalle: '22 décembre au 19 janvier' },
      { nom: 'Verseau',    nature: 'Air',   intervalle: '20 janvier au 18 février' },
      { nom: 'Poissons',   nature: 'Eau',   intervalle: '19 février au 20 mars' }
    ];

    // Résultats ésotériques d'une base (aucun détail de calcul, juste les valeurs).
    function computeEso(v) {
      const fmt = (n) => Number(n).toLocaleString('fr-FR');
      if (!v || v <= 0) {
        return { face: '—', cachee: '—', rouhani: '—', lumineux: '—', ordre: '—', signe: '—', nature: '—', intervalle: '—' };
      }
      const cachee = parseInt(String(v).split('').reverse().join(''), 10) || 0; // 711 → 117
      const ordre  = v % 12;
      const z      = ZODIAC[ordre === 0 ? 12 : ordre];
      return {
        face:       fmt(v),
        cachee:     fmt(cachee),
        rouhani:    fmt(v * v),
        lumineux:   fmt((v * (v + 1)) / 2),
        ordre:      String(ordre),
        signe:      z.nom,
        nature:     z.nature,
        intervalle: z.intervalle
      };
    }

    // Affiche les deux bases CÔTE À CÔTE (Mashreqi / Maghrébi), résultats seuls.
    function renderEsoInfo(mash, magh) {
      const el = document.getElementById('esoInfo');
      if ((!mash || mash <= 0) && (!magh || magh <= 0)) { el.innerHTML = ''; return; }

      const A = computeEso(mash), B = computeEso(magh);
      const rows = [
        ['Face apparente',      A.face,       B.face],
        ['Face cachée',         A.cachee,     B.cachee],
        ['Adad rouhâni',        A.rouhani,    B.rouhani],
        ['Adad lumineux',       A.lumineux,   B.lumineux],
        ['Ordre zodiaque',      A.ordre,      B.ordre],
        ['Signe zodiaque',      A.signe,      B.signe],
        ['Nature zodiaque',     A.nature,     B.nature],
        ['Intervalle zodiaque', A.intervalle, B.intervalle]
      ];

      el.innerHTML =
        '<div class="eso-row eso-head"><span class="eso-k"></span>' +
          '<span class="eso-v">☀️ Mashreqi</span><span class="eso-v">🌙 Maghrébi</span></div>' +
        rows.map(([k, a, b]) =>
          `<div class="eso-row"><span class="eso-k">${k}</span><span class="eso-v">${a}</span><span class="eso-v">${b}</span></div>`
        ).join('');
    }

    // --- Comparateur ---
    function compareWords() {
      const w1 = normalizeArabic(document.getElementById('compareInput1').value);
      const w2 = normalizeArabic(document.getElementById('compareInput2').value);
      const sum1 = computeSum(w1, 'mashriqi');
      const sum2 = computeSum(w2, 'mashriqi');
      const diff = Math.abs(sum1 - sum2);
      document.getElementById('compareDiff').textContent = diff;
      const interpret = diff === 0 ? '(Identique)' : '';
      document.getElementById('compareInterpret').textContent = interpret;
    }

    function computeSum(word, system) {
      if (!word) return 0;
      return word.split('').reduce((acc, ch) => acc + getLetterValue(ch, system), 0);
    }

    // --- Historique (localStorage) ---
    const HISTORY_KEY = 'abajad_history';
    function loadHistory() {
      const raw = localStorage.getItem(HISTORY_KEY);
      return raw ? JSON.parse(raw) : [];
    }
    function saveHistory(hist) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(hist.slice(0, 20))); // limite 20 entrées
    }
    function addToHistory(word, mash, magh) {
      if (!word) return;
      let hist = loadHistory();
      hist.unshift({ word, mash, magh, date: new Date().toLocaleString() });
      hist = hist.slice(0, 20);
      saveHistory(hist);
      renderHistory(hist);
    }
    function clearHistory() {
      localStorage.removeItem(HISTORY_KEY);
      document.getElementById('historyContainer').innerHTML = '<span style="color:var(--text-muted);">Aucun historique</span>';
    }
    function renderHistory(hist) {
      const container = document.getElementById('historyContainer');
      if (!hist || hist.length === 0) {
        container.innerHTML = '<span style="color:var(--text-muted);">Aucun historique</span>';
        return;
      }
      container.innerHTML = hist.map(h => `
        <div class="history-item">
          <span dir="rtl">${h.word}</span>
          <span><strong>${h.mash}</strong> / ${h.magh}</span>
          <span style="font-size:0.7rem;">${h.date}</span>
        </div>
      `).join('');
    }

    // --- Tableau de référence ---
    function showTable(system, el) {
      document.querySelectorAll('.sys-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      const labels = {
        mashriqi: 'Tableau Machreqi — utilisé en Orient',
        maghrebi:  'Tableau Maghrébi — utilisé en Afrique du Nord & Ouest'
      };
      document.getElementById('table-label').innerText = labels[system];
      document.getElementById('lettersGrid').innerHTML = TABLES[system].map(([ch,val]) => `
        <div class="letter-cell">
          <div class="letter-char">${ch}</div>
          <div class="letter-val">${val}</div>
        </div>
      `).join('');
    }

    // --- Gating avec authentification (appelé par oninput) ---
    function gatedAbajad() {
      // ensureAccess doit exister dans main.js (fonction qui vérifie l'accès et lance le callback)
      if (typeof ensureAccess === 'function') {
        ensureAccess(() => calculateAbajad());
      } else {
        calculateAbajad(); // fallback pour test hors Firebase
      }
    }

    // --- Initialisation au chargement ---
    // Suggestions de versets/mots depuis le RTDB (nœud versetRef).
    async function loadVersetSuggestions() {
      try {
        const { items } = await apiPost('list-content', { kind: 'verset' });
        const dl = document.getElementById('versetList');
        dl.innerHTML = (items || [])
          .map(v => v && v.verset ? `<option value="${String(v.verset).replace(/"/g,'&quot;')}">` : '')
          .join('');
      } catch (e) { /* silencieux : réseau/accès */ }
    }
    window.addEventListener('DOMContentLoaded', () => {
      loadVersetSuggestions();
    });
  </script>
    <script src="/pwa.js" defer></script>
</body>
