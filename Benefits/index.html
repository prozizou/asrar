<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <script>
        // Journalisation silencieuse (plus d'alerte bloquante à chaque erreur JS).
        window.onerror = function (msg, url, line, col, err) {
            console.error('Erreur JS :', msg, '@', (url || '') + ':' + line, err || '');
        };
        window.addEventListener('unhandledrejection', function (event) {
            console.warn('Rejet non géré :', event.reason);
        });
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asma ul-Husna | Les Noms d'Allah</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a232e">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css?v=8">
  <script src="/js/theme.js"></script>
</head>
<body>

    <div class="app-wrapper">
        <!-- Header harmonisé avec le CSS -->
        <header class="app-header">
            <div class="header-inner">
                <div class="header-brand">
                    <div class="brand-icon">
                        <img src="/assets/logo-mark.png" alt="ASRAR PRO"
                             style="width:100%;height:100%;object-fit:cover;border-radius:inherit;">
                    </div>
                    <div>
                        <h1 class="brand-title">Asma ul-Husna</h1>
                        <div class="brand-subtitle">Les plus beaux noms d'Allah — sagesse, lumière et bénédiction</div>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="themeToggle" class="icon-btn" aria-label="Changer le thème"><i class="fas fa-sun"></i></button>
                    <button id="viewToggle" class="icon-btn" aria-label="Changer la vue" hidden style="display:none"><i class="fas fa-th-large"></i></button>
                    <button id="showFavoritesBtn" class="icon-btn" aria-label="Voir les favoris"><i class="far fa-star"></i></button>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-pill">
                    <i class="fas fa-dharmachakra"></i>
                    <span id="countDisplay">0</span> noms révélés
                </div>
            </div>
        </header>

        <div class="search-wrapper">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Rechercher par nom, translitération ou sens..." autocomplete="off">
                <button id="clearSearch" class="clear-btn" style="display: none;"><i class="fas fa-times"></i></button>
            </div>
            <div id="suggestionsBox" class="suggestions-dropdown"></div>
        </div>

        <main id="cardsContainer" class="cards-grid">
        </main>
        
        <footer class="app-footer">
            <div class="footer-inner">
                <span>Données en temps réel</span>
                <span class="footer-dot"></span>
                <span>Élégance spirituelle</span>
            </div>
        </footer>
    </div>

    <!-- Modale harmonisée avec le CSS -->
    <div id="nameModal" class="modal" hidden>
        <div class="modal-backdrop"></div>
        <div class="modal-dialog">
            <div class="modal-header">
                <button class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div id="modalArabic" class="modal-arabic"></div>
                <div id="modalTranslit" class="modal-translit"></div>
                <div id="modalNumber" class="modal-number-badge"></div>
                
                <div class="modal-section">
                    <div class="modal-section-label"><i class="fas fa-gem"></i> Signification</div>
                    <div id="modalMeaning" class="modal-text"></div>
                </div>
                
                <div class="modal-section" id="modalBenefitSection" style="display:none;">
                    <div class="modal-section-label"><i class="fas fa-leaf"></i> Bienfait</div>
                    <div id="modalBenefit" class="modal-text"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="modalPlayAudio" class="btn btn-ghost"><i class="fas fa-volume-up"></i> Écouter</button>
                <button id="modalToggleFavorite" class="btn btn-primary"><i class="far fa-star"></i> Ajouter aux favoris</button>
            </div>
        </div>
    </div>

    <!-- Boutons de scroll flottants (ajoutés pour correspondre au JS) -->
    <div class="scroll-fab">
        <button id="scrollTopBtn" class="fab-btn" aria-label="Haut de page"><i class="fas fa-arrow-up"></i></button>
        <button id="scrollBottomBtn" class="fab-btn" aria-label="Bas de page"><i class="fas fa-arrow-down"></i></button>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="../js/whatsapp.js"></script>
    <script type="module" src="app.js?v=8"></script>
    
    <script src="/pwa.js" defer></script>
</body>
</html>
